<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポイント還元シミュレーター</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-main: #111827;
      --text-sub: #6b7280;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --border: rgba(17, 24, 39, 0.1);
      --success-bg: #eef6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 10%, #dbeafe 0%, rgba(219, 234, 254, 0) 45%),
        radial-gradient(circle at 85% 0%, #e0e7ff 0%, rgba(224, 231, 255, 0) 40%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }

    .app {
      width: min(680px, 100%);
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 2vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 0 0 20px;
      color: var(--text-sub);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 600;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 1rem;
      padding: 12px 14px;
      background: #fff;
      color: var(--text-main);
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(37, 99, 235, 0.2);
      border-color: rgba(37, 99, 235, 0.45);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint {
      margin: 0;
      font-size: 0.82rem;
      color: var(--text-sub);
    }

    button {
      margin-top: 4px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin-top: 18px;
      border-radius: 14px;
      background: var(--success-bg);
      border: 1px solid rgba(37, 99, 235, 0.16);
      padding: 14px;
      display: none;
    }

    .result.active {
      display: block;
    }

    .result p {
      margin: 6px 0;
    }

    .result .label {
      color: var(--text-sub);
      font-size: 0.86rem;
    }

    .result .value {
      font-size: 1.18rem;
      font-weight: 700;
    }

    .error {
      margin-top: 10px;
      color: #b91c1c;
      font-size: 0.9rem;
      min-height: 1.3em;
    }

    @media (max-width: 620px) {
      .app {
        padding: 18px 16px;
        border-radius: 16px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      input,
      select,
      button {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="ポイント還元シミュレーター">
    <h1>ポイント還元シミュレーター</h1>
    <p class="sub">価格と還元率を入力して、獲得ポイントと実質価格をかんたんに確認できます。</p>

    <section class="grid">
      <div class="field">
        <label for="price">商品価格（円）</label>
        <input id="price" type="number" min="0" step="1" placeholder="例: 79800" inputmode="numeric">
      </div>

      <div class="row">
        <div class="field">
          <label for="ratePreset">ポイント還元率（プリセット）</label>
          <select id="ratePreset">
            <option value="10">10%</option>
            <option value="8">8%</option>
            <option value="5" selected>5%</option>
            <option value="3">3%</option>
            <option value="1">1%</option>
          </select>
        </div>

        <div class="field">
          <label for="rateCustom">ポイント還元率（自由入力 %）</label>
          <input id="rateCustom" type="number" min="0" step="0.1" placeholder="入力時はこちらを優先" inputmode="decimal">
          <p class="hint">自由入力が空なら、プリセット値を使います。</p>
        </div>
      </div>

      <button id="calcBtn" type="button">計算する</button>
      <p id="error" class="error" aria-live="polite"></p>

      <div id="result" class="result" aria-live="polite">
        <p class="label">獲得ポイント</p>
        <p id="pointsText" class="value">-</p>
        <p class="label">実質価格（価格 - ポイント）</p>
        <p id="netText" class="value">-</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const priceInput = document.getElementById("price");
      const ratePreset = document.getElementById("ratePreset");
      const rateCustom = document.getElementById("rateCustom");
      const calcBtn = document.getElementById("calcBtn");
      const resultEl = document.getElementById("result");
      const pointsText = document.getElementById("pointsText");
      const netText = document.getElementById("netText");
      const errorEl = document.getElementById("error");

      function formatYen(value) {
        return new Intl.NumberFormat("ja-JP").format(value) + " 円";
      }

      function getRate() {
        const custom = rateCustom.value.trim();
        if (custom !== "") {
          return Number(custom);
        }
        return Number(ratePreset.value);
      }

      function calculate() {
        errorEl.textContent = "";
        resultEl.classList.remove("active");

        const price = Number(priceInput.value);
        const rate = getRate();

        if (!Number.isFinite(price) || price < 0) {
          errorEl.textContent = "商品価格を0以上で入力してください。";
          return;
        }
        if (!Number.isFinite(rate) || rate < 0) {
          errorEl.textContent = "還元率を0以上で入力してください。";
          return;
        }

        const points = Math.floor(price * (rate / 100));
        const netPrice = Math.max(price - points, 0);

        pointsText.textContent = formatYen(points) + "（" + rate + "%）";
        netText.textContent = formatYen(netPrice);
        resultEl.classList.add("active");
      }

      calcBtn.addEventListener("click", calculate);
      ratePreset.addEventListener("change", function () {
        if (rateCustom.value.trim() === "") {
          errorEl.textContent = "";
        }
      });
      priceInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          calculate();
        }
      });
      rateCustom.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          calculate();
        }
      });
    })();
  </script>
</body>
</html>
